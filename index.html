<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>三重靜思堂｜人文生態導覽</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400;700&family=Noto+Sans+TC:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --bg-color: #f7f3ed;
            --card-bg: #ffffff;
            --text-main: #3d3d3d;
            --text-dim: #7a7a7a;
            --gold-accent: #b08d57;
            --border-metal: #dcd0c0;
        }

        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .header-bar { width: 100%; height: 6px; background: linear-gradient(90deg, #dcd0c0, var(--gold-accent), #dcd0c0); }

        header { padding: 40px 20px; text-align: center; }
        header h2 { font-family: 'Noto Serif TC', serif; font-weight: 400; letter-spacing: 4px; margin: 0; color: var(--gold-accent); font-size: 16px; }

        .plant-card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-metal);
            padding: 40px;
            margin: 20px;
            max-width: 450px;
            border-radius: 4px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            text-align: left;
        }

        .plant-card h1 { font-family: 'Noto Serif TC', serif; font-size: 36px; margin: 10px 0; color: var(--text-main); }
        .origin { font-size: 12px; color: var(--gold-accent); border: 1px solid var(--gold-accent); padding: 2px 8px; border-radius: 2px; letter-spacing: 1px; }

        .collection-section { width: 90%; max-width: 600px; margin-top: 40px; padding-bottom: 40px; }
        .collection-section h3 { text-align: center; font-family: 'Noto Serif TC', serif; font-weight: 400; letter-spacing: 2px; color: var(--text-main); margin-bottom: 30px; }

        .stamp-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; }
        .stamp-item { 
            aspect-ratio: 1; 
            background: #eee8e0; 
            border: 1px solid #dcd0c0; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            transition: 0.4s; 
            border-radius: 2px;
            overflow: hidden;
        }
        /* 放大並填滿方框 */
        .stamp-item i { font-size: 50px; color: #c0b5a5; }
        .stamp-item.active { background: #fff; border-color: var(--gold-accent); }
        .stamp-item.active i { color: var(--gold-accent); }

        .action-section { margin-top: 50px; padding: 30px; border-top: 1px solid #dcd0c0; width: 90%; max-width: 600px; text-align: center; }
        .btn-link { display: inline-block; width: 42%; border: 1px solid var(--gold-accent); padding: 12px; color: var(--gold-accent); text-decoration: none; font-size: 13px; margin: 5px; transition: 0.3s; border-radius: 2px; }
        .btn-link:hover { background: var(--gold-accent); color: #fff; }
        .btn-reset { background: none; border: 1px solid #c0b5a5; color: #999; padding: 8px 16px; margin-top: 30px; cursor: pointer; font-size: 12px; }
    </style>
</head>
<body>

    <div class="header-bar"></div>
    <header><h2>三重靜思堂｜靜心生態導覽</h2></header>

    <div id="plant-display"></div>

    <div class="collection-section">
        <h3>🌱 萬物靜觀｜集章冊</h3>
        <div id="stamp-grid" class="stamp-grid"></div>
        <p id="progress-text" style="text-align:center; color:var(--text-dim); font-size: 13px; margin-top: 20px;">已記錄生命足跡: 0 / 19</p>
    </div>

    <div class="action-section">
        <h3 style="font-size: 12px; color: #888; margin-bottom: 20px;">人文互動與分享</h3>
        <a href="https://share.google/QB74gj9jVdIyogUb1" target="_blank" class="btn-link"><i class="fa-brands fa-google"></i> Google 迴響</a>
        <a href="https://www.facebook.com/TzuChiSanchong/?locale=zh_TW" target="_blank" class="btn-link"><i class="fa-brands fa-facebook"></i> 分享足跡</a>
        <br>
        <button class="btn-reset" onclick="resetStamps()">重置紀錄</button>
    </div>

    <script>
        const plants = {
            "pistacia": { "name": "黃連木", "origin": "原生種", "desc": "羽狀複葉如傘，秋紅展現生命之美，靜守於庭院之中。", "icon": "fa-leaf" },
            "fraxinus": { "name": "光臘樹", "origin": "原生種", "desc": "樹幹斑紋優雅，為自然界的小生命提供溫暖的依靠。", "icon": "fa-bug" },
            "pinus": { "name": "琉球松", "origin": "外來種", "desc": "蒼勁挺拔，如同長者的睿智，靜觀歲月更迭。", "icon": "fa-tree" },
            "hibiscus": { "name": "木芙蓉", "origin": "原生種", "desc": "晨白暮粉，如心境流轉，呈現大自然的無常之美。", "icon": "fa-fan" },
            "osmanthus": { "name": "桂花", "origin": "外來種", "desc": "幽香傳千里，不爭妍鬥艷，傳遞清淨的氣息。", "icon": "fa-wind" },
            "taxodium": { "name": "落羽松", "origin": "外來種", "desc": "羽葉細膩，秋冬時節紅褐色，是大地的禮讚。", "icon": "fa-snowflake" },
            "cinnamomum": { "name": "樟樹", "origin": "原生種", "desc": "清香除瘴，廣大遮蔭，如同慈悲的心念包容萬物。", "icon": "fa-tree" },
            "bischofia": { "name": "茄苳", "origin": "原生種", "desc": "強韌長青，庇護眾鳥，展現生命共同體的謙卑。", "icon": "fa-crow" },
            "liquidambar": { "name": "楓香", "origin": "原生種", "desc": "掌狀葉展現歲月層次，秋冬轉色如畫，靜心欣賞。", "icon": "fa-sun" },
            "delonix": { "name": "鳳凰木", "origin": "外來種", "desc": "盛夏火紅燦爛，是生命熱情與活力最好的體現。", "icon": "fa-fire" },
            "podocarpus": { "name": "羅漢松", "origin": "原生種", "desc": "端正莊嚴，如同修行的姿態，守護一方淨土。", "icon": "fa-hands-praying" },
            "crossostephium": { "name": "芙蓉", "origin": "原生種", "desc": "銀白絨毛潔淨人心，是謙和柔軟的象徵。", "icon": "fa-spa" },
            "ixora": { "name": "仙丹", "origin": "外來種", "desc": "簇擁花開，傳遞喜悅與滿滿的祝福。", "icon": "fa-circle-dot" },
            "breynia": { "name": "斑葉長虹", "origin": "外來種", "desc": "葉斑絢爛如藝術，體現自然界多樣性的美感。", "icon": "fa-palette" },
            "rhododendron": { "name": "平戶杜鵑", "origin": "外來種", "desc": "繁花簇擁，為大地增添溫馨的春意與生機。", "icon": "fa-clover" },
            "ophiopogon": { "name": "麥門冬", "origin": "原生種", "desc": "葉叢蒼翠，藍色果實純淨自然，靜默守候。", "icon": "fa-gem" },
            "ophiopogon_p": { "name": "沿階草", "origin": "原生種", "desc": "如綠地毯般平整，柔韌適應，展現韌性。", "icon": "fa-stairs" },
            "axonopus": { "name": "巴西地毯草", "origin": "外來種", "desc": "平鋪在地，滋養大地，展現無私的包容。", "icon": "fa-rug" },
            "zoysia": { "name": "台北草", "origin": "原生種", "desc": "質地細緻平整，守護足下的每一步，寧靜致遠。", "icon": "fa-grip-lines" }
        };

        const params = new URLSearchParams(window.location.search);
        const id = params.get('id');
        let stamps = JSON.parse(localStorage.getItem('myStamps') || '[]');

        function init() {
            const display = document.getElementById('plant-display');
            if (plants[id]) {
                display.innerHTML = `<div class="plant-card"><span class="origin">${plants[id].origin}</span><h1>${plants[id].name}</h1><p>${plants[id].desc}</p></div>`;
                if (!stamps.includes(id)) { stamps.push(id); localStorage.setItem('myStamps', JSON.stringify(stamps)); }
            } else {
                display.innerHTML = `<div class="plant-card" style="text-align:center;"><h2>生態靜心導覽</h2><p>請掃描植物旁的 QR Code，開啟與自然對話的契機。</p></div>`;
            }

            const grid = document.getElementById('stamp-grid');
            Object.keys(plants).forEach(key => {
                const item = document.createElement('div');
                item.className = 'stamp-item' + (stamps.includes(key) ? ' active' : '');
                item.innerHTML = `<i class="fa-solid ${plants[key].icon}"></i>`;
                grid.appendChild(item);
            });
            document.getElementById('progress-text').innerText = `已記錄生命足跡: ${stamps.length} / 19`;
        }

        function resetStamps() { if(confirm("確定要將記錄歸零，重新出發嗎？")){ localStorage.removeItem('myStamps'); location.reload(); } }
        init();
    </script>
</body>
</html>
